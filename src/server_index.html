<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>◍ enxame</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<style>
  :root{
    /* dark (default) */
    --bg:#0c0e14; --header:rgba(12,14,20,.85);
    --txt:#dce1ec; --dim:#828b9f; --faint:#586073; --line:#1c2130;
    --accent:#6cb6ff; --num:#8fa6c8; --num-ext:#59617a;
    --fld:#a7c1e6; --fld-ext:#8b94a8; --hover:rgba(108,182,255,.06);
    --green:#7ee787; --amber:#e3b341; --grey:#79839a; --spark:#46d089;
    --barbg:#1e2433; --ovbg:rgba(6,8,12,.72); --termwrap:#0a0c12; --termborder:#243a59;
    --xterm-bg:#0a0c12; --xterm-fg:#dce1ec;
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  /* light palette */
  @media (prefers-color-scheme: light){ :root:not([data-theme="dark"]){
    --bg:#f3f5fa; --header:rgba(243,245,250,.85);
    --txt:#1b2230; --dim:#5a6376; --faint:#9aa3b5; --line:#e2e6ef;
    --accent:#2563c9; --num:#3f5f86; --num-ext:#a6aebd;
    --fld:#365d92; --fld-ext:#808a9c; --hover:rgba(37,99,201,.07);
    --green:#1f9d57; --amber:#a9760f; --grey:#8a93a6; --spark:#1f9d57;
    --barbg:#e3e8f1; --ovbg:rgba(40,50,70,.4); --termwrap:#ffffff; --termborder:#c7d0e0;
    --xterm-bg:#ffffff; --xterm-fg:#1b2230;
  }}
  :root[data-theme="light"]{
    --bg:#f3f5fa; --header:rgba(243,245,250,.85);
    --txt:#1b2230; --dim:#5a6376; --faint:#9aa3b5; --line:#e2e6ef;
    --accent:#2563c9; --num:#3f5f86; --num-ext:#a6aebd;
    --fld:#365d92; --fld-ext:#808a9c; --hover:rgba(37,99,201,.07);
    --green:#1f9d57; --amber:#a9760f; --grey:#8a93a6; --spark:#1f9d57;
    --barbg:#e3e8f1; --ovbg:rgba(40,50,70,.4); --termwrap:#ffffff; --termborder:#c7d0e0;
    --xterm-bg:#ffffff; --xterm-fg:#1b2230;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--txt);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  header{
    position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:14px;
    padding:15px 26px;background:var(--header);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  header .logo{font-size:19px;font-weight:700}
  header .logo .d{color:var(--accent)}
  header .counts{color:var(--dim);font-size:13px}
  header .counts b{color:var(--txt);font-weight:600}
  header .live{margin-left:auto;display:flex;align-items:center;gap:7px;color:var(--dim);font-size:12px}
  .themebtn{cursor:pointer;background:transparent;border:1px solid var(--line);color:var(--dim);
    border-radius:8px;padding:3px 10px;font-size:14px;line-height:1}
  .themebtn:hover{color:var(--txt);background:var(--hover)}
  header .live .p{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(126,231,135,.5)}70%{box-shadow:0 0 0 7px rgba(126,231,135,0)}100%{box-shadow:0 0 0 0 rgba(126,231,135,0)}}

  main{padding:8px 18px 40px;display:grid;gap:6px 34px;
       grid-template-columns:repeat(auto-fill,minmax(360px,1fr));max-width:1600px;margin:0 auto}

  .agent{padding:16px 14px 18px 16px;border-radius:10px;position:relative;transition:background .15s}
  .agent::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:2px;border-radius:2px;background:var(--faint)}
  .agent.tmux::before{background:var(--accent)}
  .agent.tmux{cursor:pointer}
  .agent.tmux:hover{background:var(--hover)}
  .agent.ext{opacity:.78}

  /* "task completed" celebration: pop + shimmering gradient in the response's hue */
  .agent.done{animation:pop .5s cubic-bezier(.2,.9,.3,1.2);z-index:3}
  .agent.done::after{
    content:"";position:absolute;inset:-2px;border-radius:13px;pointer-events:none;
    background:linear-gradient(115deg,
      hsla(var(--h,210),90%,62%,0) 20%,
      hsla(var(--h,210),95%,64%,.40) 45%,
      hsla(calc(var(--h,210) + 50),95%,64%,.40) 55%,
      hsla(var(--h,210),90%,62%,0) 80%);
    background-size:260% 100%;
    box-shadow:0 0 0 1px hsla(var(--h,210),95%,66%,.7), 0 10px 46px hsla(var(--h,210),90%,55%,.45);
    animation:shimmer 3s ease forwards;
  }
  @keyframes pop{0%{transform:scale(1)}35%{transform:scale(1.07)}100%{transform:scale(1)}}
  @keyframes shimmer{0%{background-position:120% 0;opacity:1}85%{opacity:1}100%{background-position:-60% 0;opacity:0}}

  .row1{display:flex;align-items:baseline;gap:10px}
  .num{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--num);min-width:24px}
  .agent.ext .num{color:var(--num-ext)}
  .dot{width:9px;height:9px;border-radius:50%;align-self:center;flex:none}
  .working{background:var(--green);box-shadow:0 0 7px rgba(126,231,135,.55)}
  .idle{background:var(--amber)} .unknown,.extdot{background:var(--grey)}
  .name{font-weight:650;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
  .tag{font-size:11px;font-family:var(--mono);color:var(--dim)}
  .tag.tmux{color:var(--accent)}

  .meta{display:flex;align-items:center;gap:10px;margin:7px 0 0 34px;color:var(--dim);font-size:12px}
  .bar{flex:1;max-width:160px;height:4px;border-radius:99px;background:var(--barbg);overflow:hidden}
  .bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--spark),var(--green))}
  .count{font-family:var(--mono);font-size:11.5px}

  .loadrow{display:flex;align-items:center;gap:9px;margin:9px 0 0 34px}
  .loadpct{font-family:var(--mono);font-size:11.5px;color:var(--dim);min-width:42px}
  .spark{flex:1;max-width:230px;height:30px;display:block}
  .sparkline{fill:none;stroke:var(--spark);stroke-width:1.5;vector-effect:non-scaling-stroke}
  .sparkarea{fill:var(--spark);opacity:.15;stroke:none}
  .agent.ext .sparkline{stroke:var(--grey)}
  .agent.ext .sparkarea{fill:var(--grey)}

  .phrase{margin:8px 0 0 34px;color:var(--dim);font-style:italic;font-size:12.5px;
          display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  .tree{margin:9px 0 0 34px;font-family:var(--mono);font-size:12.5px;line-height:1.55}
  .tree .ln{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tree .br{color:var(--faint)} .tree .fld{color:var(--fld)}
  .agent.ext .tree .fld{color:var(--fld-ext)}

  .empty{grid-column:1/-1;text-align:center;color:var(--dim);padding:70px 0}

  /* terminal overlay */
  #ov{position:fixed;inset:0;background:var(--ovbg);backdrop-filter:blur(3px);
      display:none;align-items:center;justify-content:center;z-index:50}
  #ov.on{display:flex}
  #term-wrap{width:min(1100px,94vw);height:min(680px,88vh);background:var(--termwrap);
      border:1px solid var(--termborder);border-radius:12px;box-shadow:0 20px 70px rgba(0,0,0,.45);
      display:flex;flex-direction:column;overflow:hidden}
  #term-bar{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--line);
      font-size:13px;color:var(--dim)}
  #term-bar .t{color:var(--txt);font-weight:600}
  #term-bar .hint{margin-left:auto;font-family:var(--mono);font-size:11px}
  #term-bar .x{cursor:pointer;color:var(--dim);padding:2px 8px;border-radius:6px}
  #term-bar .x:hover{background:var(--hover);color:var(--txt)}
  #term{flex:1;padding:8px 10px}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="d">◍</span> enxame</div>
  <div class="counts" id="counts">…</div>
  <div class="live"><span class="p"></span> live</div>
  <button id="theme" class="themebtn" onclick="cycleTheme()" title="theme">◐</button>
</header>
<main id="grid"></main>

<div id="ov" onclick="if(event.target===this)closeTerm()">
  <div id="term-wrap">
    <div id="term-bar">
      <span class="t" id="term-title">terminal</span>
      <span class="hint">Ctrl-Q or prefix+d to detach</span>
      <span class="x" onclick="closeTerm()">✕ close</span>
    </div>
    <div id="term"></div>
  </div>
</div>

<script>
const esc = s => (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// ---- adaptive theme: auto (system) / light / dark, persisted ----
const THEME_KEY="enxame-theme";
function themeMode(){ return localStorage.getItem(THEME_KEY) || "auto"; }
function resolvedTheme(){
  const m=themeMode();
  if(m!=="auto") return m;
  return matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
}
function applyTheme(){
  const m=themeMode(), root=document.documentElement;
  if(m==="auto") root.removeAttribute("data-theme"); else root.setAttribute("data-theme", m);
  const btn=document.getElementById("theme");
  if(btn){ btn.textContent = m==="auto" ? "◐" : (m==="light" ? "☀" : "☾"); btn.title="theme: "+m; }
  if(term){ term.options.theme = xtermTheme(); }
}
function cycleTheme(){
  const order=["auto","light","dark"];
  localStorage.setItem(THEME_KEY, order[(order.indexOf(themeMode())+1)%3]);
  applyTheme();
}
function xtermTheme(){
  return resolvedTheme()==="light"
    ? {background:"#ffffff",foreground:"#1b2230",cursor:"#2563c9",selectionBackground:"#bcd3f5"}
    : {background:"#0a0c12",foreground:"#dce1ec",cursor:"#6cb6ff",selectionBackground:"#22406b"};
}
applyTheme();
matchMedia("(prefers-color-scheme: light)").addEventListener("change", applyTheme);

function tree(folders){
  if(!folders || !folders.length) return "";
  return '<div class="tree">' + folders.map((f,i)=>{
    const last = i===folders.length-1;
    const br = last ? "╰──▶ " : "├──▶ ";
    return `<div class="ln"><span class="br">${br}</span><span class="fld">${esc(f)}</span></div>`;
  }).join("") + '</div>';
}

function spark(act){
  const w=100, h=30;
  const a = (act&&act.length)? act : [0];
  const n=a.length;
  const pts=a.map((v,i)=>[ n>1 ? (i/(n-1))*w : 0, h-(Math.max(0,Math.min(100,v))/100)*(h-2)-1 ]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=line+` L ${w} ${h} L 0 ${h} Z`;
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`+
         `<path class="sparkarea" d="${area}"/><path class="sparkline" d="${line}"/></svg>`;
}
// Hue derived from the last AI response text — its "colour".
function hue(s){ let h=2166136261; for(const c of (s||" ")){ h^=c.charCodeAt(0); h=(h*16777619)>>>0; } return h%360; }

function innerHtml(a, i){
  const dotcls = a.openable ? a.status : "extdot";
  const tag = a.openable ? '<span class="tag tmux">⧉ tmux</span>'
                         : '<span class="tag">external'+(a.procs>1?' ×'+a.procs:'')+'</span>';
  let meta;
  if(a.todos){ const [d,t]=a.todos; const p=t?Math.round(d*100/t):0;
    meta = `<div class="meta"><span>${a.status}</span><div class="bar"><i style="width:${p}%"></i></div><span class="count">${d}/${t}</span></div>`;
  } else {
    meta = `<div class="meta"><span>${a.status}</span></div>`;
  }
  const loadrow = `<div class="loadrow"><span class="loadpct">⚡ ${a.load||0}%</span>${spark(a.activity)}</div>`;
  const phrase = a.phrase ? `<div class="phrase">${esc(a.phrase)}</div>` : "";
  return `<div class="row1"><span class="num">${i+1}</span><span class="dot ${dotcls}"></span>`+
         `<span class="name">${esc(a.label)}</span>${tag}</div>`+
         meta + loadrow + phrase + tree(a.folders);
}

// Keyed, in-place rendering so completion animations aren't interrupted by the
// 1.5s refresh.
const cards = {};       // cwd -> {el, seq, timer}
let lastOrder = "";
async function tick(){
  let d;
  try{
    const r = await fetch("/api/agents",{cache:"no-store"});
    d = await r.json();
  }catch(e){ return; }
  document.getElementById("counts").innerHTML =
    `<b>${d.openable}</b> in tmux · <b>${d.external}</b> external`;
  const grid = document.getElementById("grid");
  const empty = grid.querySelector(".empty"); if(empty) empty.remove();

  const seen = new Set();
  d.agents.forEach((a,i)=>{
    seen.add(a.cwd);
    let e = cards[a.cwd];
    if(!e){ const el=document.createElement("div"); e={el,seq:a.seq,timer:0}; cards[a.cwd]=e; grid.appendChild(el); }
    const el = e.el;
    el.classList.add("agent");
    el.classList.toggle("tmux", a.openable);
    el.classList.toggle("ext", !a.openable);
    el.style.setProperty("--h", hue(a.phrase));
    el.innerHTML = innerHtml(a, i);
    el.onclick = (a.openable && a.wid) ? ()=>openTerm(a.wid, a.label) : null;
    el.title = (a.openable && a.wid) ? "click to open terminal" : "";
    // Fresh completion → celebrate for 3s.
    if(a.seq > e.seq){
      e.seq = a.seq;
      el.classList.remove("done"); void el.offsetWidth; // restart animation
      el.classList.add("done");
      clearTimeout(e.timer);
      e.timer = setTimeout(()=>el.classList.remove("done"), 3000);
    }
  });
  // remove vanished agents
  for(const cwd of Object.keys(cards)){
    if(!seen.has(cwd)){ cards[cwd].el.remove(); delete cards[cwd]; }
  }
  if(!d.agents.length && !grid.querySelector(".empty")){
    grid.innerHTML = '<div class="empty">No claude agents found.</div>';
    return;
  }
  // Reorder DOM to match API order only when it actually changed (avoids
  // reflows that could disturb running animations).
  const order = d.agents.map(a=>a.cwd).join("\n");
  if(order !== lastOrder){
    lastOrder = order;
    d.agents.forEach(a=>{ const e=cards[a.cwd]; if(e) grid.appendChild(e.el); });
  }
}
tick(); setInterval(tick, 1500);

// ---- xterm.js terminal over WebSocket ----
var term=null, fit=null, ws=null;
function openTerm(wid, label){
  document.getElementById("term-title").textContent = label;
  document.getElementById("ov").classList.add("on");
  const el = document.getElementById("term"); el.innerHTML="";
  term = new Terminal({
    fontFamily:'"SF Mono",ui-monospace,"JetBrains Mono",Menlo,monospace',
    fontSize:13, cursorBlink:true, allowProposedApi:true,
    theme: xtermTheme()
  });
  fit = new FitAddon.FitAddon();
  term.loadAddon(fit);
  term.open(el);
  setTimeout(()=>{ fit.fit(); connect(wid); }, 30);
}
function connect(wid){
  const proto = location.protocol==="https:" ? "wss":"ws";
  ws = new WebSocket(`${proto}://${location.host}/ws?w=${encodeURIComponent(wid)}`);
  ws.binaryType="arraybuffer";
  ws.onopen = ()=>{ sendResize(); term.focus(); };
  ws.onmessage = (e)=>{ if(e.data instanceof ArrayBuffer) term.write(new Uint8Array(e.data)); };
  ws.onclose = ()=>{ term && term.write("\r\n\x1b[2m[detached]\x1b[0m\r\n"); };
  term.onData(d=>{ if(ws&&ws.readyState===1) ws.send(new TextEncoder().encode(d)); });
  term.onResize(()=>sendResize());
  window.addEventListener("resize", onWinResize);
}
function sendResize(){
  if(!ws||ws.readyState!==1||!term) return;
  ws.send(JSON.stringify({resize:{cols:term.cols, rows:term.rows}}));
}
function onWinResize(){ if(fit){ fit.fit(); } }
function closeTerm(){
  window.removeEventListener("resize", onWinResize);
  if(ws){ try{ws.close();}catch(e){} ws=null; }
  if(term){ term.dispose(); term=null; }
  document.getElementById("ov").classList.remove("on");
}
document.addEventListener("keydown", e=>{ if(e.key==="Escape" && document.getElementById("ov").classList.contains("on")) closeTerm(); });
</script>
</body>
</html>
