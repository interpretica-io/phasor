<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>◍ enxame</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<style>
  :root{
    --bg:#070910; --txt:#e6ebf5; --dim:#8b94ab; --line:rgba(255,255,255,.10);
    --accent:#6cb6ff; --accent-rgb:108,182,255;
    --green:#5ce08a; --green-rgb:92,224,138; --amber:#f0c75a; --amber-rgb:240,199,90;
    --grey:#7e879c; --grey-rgb:126,135,156; --fld:#9fb4d6;
    --glass:rgba(20,25,40,.6); --glass-bd:rgba(255,255,255,.1);
    --ovbg:rgba(4,6,12,.7); --termwrap:#0a0c12; --termborder:rgba(108,182,255,.3);
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,Segoe UI,Roboto,sans-serif;
  }
  @media (prefers-color-scheme: light){ :root:not([data-theme="dark"]){
    --bg:#eef1f8; --txt:#141c2b; --dim:#586176; --line:rgba(20,30,60,.12);
    --accent:#2563c9; --accent-rgb:37,99,201;
    --green:#15924d; --green-rgb:21,146,77; --amber:#b07d12; --amber-rgb:176,125,18;
    --grey:#828b9e; --grey-rgb:130,139,158; --fld:#34527c;
    --glass:rgba(255,255,255,.7); --glass-bd:rgba(20,40,90,.12);
    --ovbg:rgba(40,52,80,.4); --termwrap:#ffffff; --termborder:rgba(37,99,201,.35);
  }}
  :root[data-theme="light"]{
    --bg:#eef1f8; --txt:#141c2b; --dim:#586176; --line:rgba(20,30,60,.12);
    --accent:#2563c9; --accent-rgb:37,99,201;
    --green:#15924d; --green-rgb:21,146,77; --amber:#b07d12; --amber-rgb:176,125,18;
    --grey:#828b9e; --grey-rgb:130,139,158; --fld:#34527c;
    --glass:rgba(255,255,255,.7); --glass-bd:rgba(20,40,90,.12);
    --ovbg:rgba(40,52,80,.4); --termwrap:#ffffff; --termborder:rgba(37,99,201,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden}
  body{background:radial-gradient(1400px 900px at 78% -10%, rgba(var(--accent-rgb),.10), transparent 60%),var(--bg);
    color:var(--txt);font:15px/1.5 var(--sans);-webkit-font-smoothing:antialiased}

  header{position:fixed;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:28px;
    padding:18px 30px;pointer-events:none}
  header>*{pointer-events:auto}
  .brand{font-size:24px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:10px}
  .brand .o{color:var(--accent);text-shadow:0 0 22px rgba(var(--accent-rgb),.7);
    display:inline-block;animation:spin 9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .stats{display:flex;gap:26px}
  .stat .v{font-size:28px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .stat .l{font-size:10px;letter-spacing:1.6px;text-transform:uppercase;color:var(--dim);margin-top:3px}
  .stat.work .v{color:var(--green);text-shadow:0 0 18px rgba(var(--green-rgb),.5)}
  .stat.idle .v{color:var(--amber)} .stat.ext .v{color:var(--grey)}
  .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .live{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:11px;letter-spacing:1px;text-transform:uppercase}
  .live .p{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(var(--green-rgb),.5)}70%{box-shadow:0 0 0 9px rgba(var(--green-rgb),0)}100%{box-shadow:0 0 0 0 rgba(var(--green-rgb),0)}}
  .themebtn{cursor:pointer;background:var(--glass);border:1px solid var(--glass-bd);color:var(--dim);
    border-radius:10px;padding:6px 12px;font-size:15px;backdrop-filter:blur(10px)}
  .themebtn:hover{color:var(--txt);border-color:var(--accent)}
  .hint2{position:fixed;bottom:14px;left:0;right:0;text-align:center;color:var(--dim);font-size:11.5px;z-index:5;pointer-events:none;opacity:.7}

  #graph{position:fixed;inset:0;width:100%;height:100%;z-index:1;display:block}

  .link{stroke:var(--accent);stroke-opacity:.18;pointer-events:none}
  .linkhit{stroke:transparent;stroke-width:14;cursor:help;pointer-events:stroke}
  .node{cursor:default}
  .node.openable{cursor:pointer}
  .node .ring{fill:none;stroke:var(--accent);stroke-opacity:.85;stroke-width:3;stroke-linecap:round;
    transition:stroke-dasharray .6s ease}
  .node .track{fill:none;stroke:var(--line);stroke-width:3}
  .node .core{stroke:rgba(255,255,255,.18);stroke-width:1.5;transition:r .5s ease}
  .node.working .core{fill:var(--green);filter:drop-shadow(0 0 12px var(--green))}
  .node.idle .core{fill:var(--amber);filter:drop-shadow(0 0 8px rgba(var(--amber-rgb),.6))}
  .node.unknown .core{fill:var(--grey)}
  .node.ext .core{fill:var(--grey);opacity:.7}
  .node.ext .ring{stroke:var(--grey);stroke-opacity:.4}
  .node.working .core{animation:breathe 2.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{filter:drop-shadow(0 0 10px var(--green))}50%{filter:drop-shadow(0 0 22px var(--green))}}
  .node .idx{fill:#06121a;font:800 16px var(--mono);text-anchor:middle;dominant-baseline:central;pointer-events:none}
  .node.ext .idx,.node.idle .idx{fill:#06121a}
  .node .lbl{fill:var(--txt);font:600 13px var(--sans);text-anchor:middle;paint-order:stroke;
    stroke:var(--bg);stroke-width:4px;pointer-events:none}
  .node.ext .lbl{fill:var(--dim)}

  /* folder list hanging in a column right under the agent node */
  .frow{fill:var(--fld);font:12px var(--mono);text-anchor:middle;paint-order:stroke;
    stroke:var(--bg);stroke-width:3px;pointer-events:none}
  .node.ext .frow{fill:var(--dim)}

  /* completion burst */
  .node.done .burst{animation:burst 1.1s ease-out}
  @keyframes burst{0%{r:0;opacity:.8}100%{r:90;opacity:0}}
  .node.done .core{animation:corepop .6s cubic-bezier(.2,.9,.3,1.4)}
  @keyframes corepop{0%{transform:scale(1)}40%{transform:scale(1.25)}100%{transform:scale(1)}}

  #tip{position:fixed;z-index:20;max-width:340px;background:var(--glass);border:1px solid var(--glass-bd);
    border-radius:12px;padding:12px 14px;backdrop-filter:blur(14px);box-shadow:0 12px 40px rgba(0,0,0,.4);
    pointer-events:none;opacity:0;transition:opacity .15s;font-size:12.5px}
  #tip.on{opacity:1}
  #tip .tt{font-weight:700;font-size:14px;margin-bottom:5px}
  #tip .tp{color:var(--dim);font-style:italic;margin-top:6px;line-height:1.5}
  #tip .tm{color:var(--dim);font-family:var(--mono);font-size:11.5px;margin-top:5px}

  #ov{position:fixed;inset:0;background:var(--ovbg);backdrop-filter:blur(6px);display:none;
    align-items:center;justify-content:center;z-index:50}
  #ov.on{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  #term-wrap{width:min(1200px,94vw);height:min(720px,88vh);background:var(--termwrap);
    border:1px solid var(--termborder);border-radius:16px;
    box-shadow:0 30px 90px rgba(0,0,0,.55),0 0 0 1px rgba(var(--accent-rgb),.15);
    display:flex;flex-direction:column;overflow:hidden}
  #term-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);
    font-size:13px;color:var(--dim)}
  #term-bar .t{color:var(--txt);font-weight:700}
  #term-bar .hint{margin-left:auto;font-family:var(--mono);font-size:11px}
  #term-bar .x{cursor:pointer;color:var(--dim);padding:3px 10px;border-radius:8px}
  #term-bar .x:hover{background:var(--accent);color:#fff}
  #term{flex:1;padding:10px 12px}
</style>
</head>
<body>
<svg id="graph"></svg>
<header>
  <div class="brand"><span class="o">◍</span> enxame</div>
  <div class="stats">
    <div class="stat total"><div class="v" id="s-total">0</div><div class="l">agents</div></div>
    <div class="stat work"><div class="v" id="s-work">0</div><div class="l">working</div></div>
    <div class="stat idle"><div class="v" id="s-idle">0</div><div class="l">idle</div></div>
    <div class="stat ext"><div class="v" id="s-ext">0</div><div class="l">external</div></div>
  </div>
  <div class="right">
    <span class="live"><span class="p"></span> live</span>
    <button id="theme" class="themebtn" onclick="cycleTheme()" title="theme">◐</button>
  </div>
</header>
<div class="hint2">drag to rearrange · scroll to zoom · click a ⧉ tmux node to open its terminal</div>
<div id="tip"></div>

<div id="ov" onclick="if(event.target===this)closeTerm()">
  <div id="term-wrap">
    <div id="term-bar"><span class="t" id="term-title">terminal</span>
      <span class="hint">Ctrl-Q or prefix+d to detach</span>
      <span class="x" onclick="closeTerm()">✕ close</span></div>
    <div id="term"></div>
  </div>
</div>

<script>
const esc=s=>(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function hue(s){let h=2166136261;for(const c of (s||" ")){h^=c.charCodeAt(0);h=(h*16777619)>>>0;}return h%360;}
// folders arrive as full paths; show just the basename.
const base=p=>(p||"").replace(/\/+$/,"").split("/").pop()||p;

// ---- theme ----
const TK="enxame-theme";
const tmode=()=>localStorage.getItem(TK)||"auto";
const resolved=()=>{const m=tmode();return m!=="auto"?m:(matchMedia("(prefers-color-scheme: light)").matches?"light":"dark");};
function applyTheme(){const m=tmode(),r=document.documentElement;
  if(m==="auto")r.removeAttribute("data-theme");else r.setAttribute("data-theme",m);
  const b=document.getElementById("theme");if(b){b.textContent=m==="auto"?"◐":(m==="light"?"☀":"☾");b.title="theme: "+m;}
  if(term)term.options.theme=xtermTheme();}
function cycleTheme(){const o=["auto","light","dark"];localStorage.setItem(TK,o[(o.indexOf(tmode())+1)%3]);applyTheme();}
function xtermTheme(){return resolved()==="light"
  ?{background:"#ffffff",foreground:"#16203a",cursor:"#2563c9",selectionBackground:"#bcd3f5"}
  :{background:"#0a0c12",foreground:"#dce1ec",cursor:"#6cb6ff",selectionBackground:"#22406b"};}
applyTheme();
matchMedia("(prefers-color-scheme: light)").addEventListener("change",applyTheme);

// ---- D3 force graph ----
const svg=d3.select("#graph");
const root=svg.append("g");
const gLink=root.append("g"), gHit=root.append("g"), gNode=root.append("g");
let W=innerWidth,H=innerHeight;
svg.call(d3.zoom().scaleExtent([.35,3]).on("zoom",e=>root.attr("transform",e.transform)));

const R=d=>16+(d.load||0)/100*26;          // agent radius by load
// Collision reserves vertical room for the folder column hanging below.
const COLL=d=>R(d)+40+(d.folders?d.folders.length:0)*15;
const sim=d3.forceSimulation()
  .force("charge",d3.forceManyBody().strength(-1100).distanceMax(1100))
  .force("link",d3.forceLink().id(d=>d.id)
     .distance(d=>Math.max(120,250-d.w*28)).strength(d=>Math.min(.55,.14+d.w*.12)))
  .force("collide",d3.forceCollide().radius(COLL).strength(1))
  .force("x",d3.forceX(()=>W/2).strength(.03))
  .force("y",d3.forceY(()=>H/2).strength(.04))
  .on("tick",ticked);

let nodes=[],links=[],lastLinks=-1;
const pos=new Map();   // id -> {x,y,vx,vy} preserved across refreshes
const seqs=new Map();  // agent id -> last completion seq

function build(agents){
  const N=agents.map((a,i)=>({id:a.cwd,i,label:a.label,status:a.status,load:a.load||0,
      openable:a.openable,wid:a.wid,phrase:a.phrase,todos:a.todos,procs:a.procs,seq:a.seq,
      hue:hue(a.phrase),folders:a.folders||[]}));
  N.forEach(n=>{const p=pos.get(n.id);if(p){n.x=p.x;n.y=p.y;n.vx=p.vx;n.vy=p.vy;}});

  // Links between agents that share working folders (weight = #shared).
  const L=[];
  for(let i=0;i<agents.length;i++){
    const fa=new Set(agents[i].folders||[]); if(!fa.size) continue;
    for(let j=i+1;j<agents.length;j++){
      const sh=[]; for(const f of (agents[j].folders||[])) if(fa.has(f)) sh.push(f);
      if(sh.length) L.push({source:agents[i].cwd,target:agents[j].cwd,w:sh.length,shared:sh});
    }
  }
  // Colour each cluster (connected component) with its own hue.
  const adj=new Map(); N.forEach(n=>adj.set(n.id,[]));
  L.forEach(l=>{adj.get(l.source).push(l.target);adj.get(l.target).push(l.source);});
  const comp=new Map(); let cid=0;
  N.forEach(n=>{ if(comp.has(n.id)||!adj.get(n.id).length) return;
    const st=[n.id]; comp.set(n.id,cid);
    while(st.length){const x=st.pop(); for(const y of adj.get(x)) if(!comp.has(y)){comp.set(y,cid);st.push(y);}}
    cid++; });
  L.forEach(l=>{ l.hue=((comp.get(l.source)||0)*137.5)%360; });
  N.forEach(n=>{ n.cluster=comp.has(n.id)?comp.get(n.id):-1; });
  return {N,L};
}

function update(agents){
  const {N,L}=build(agents);
  const topoChanged = N.length!==nodes.length || N.some(n=>!pos.has(n.id));
  nodes=N; links=L;

  // overlap links
  const light=resolved()==="light";
  const lkey=d=>(d.source.id||d.source)+"|"+(d.target.id||d.target);
  const lk=gLink.selectAll("line").data(links,lkey);
  lk.exit().remove();
  lk.enter().append("line").attr("class","link").merge(lk)
    .attr("stroke",d=>`hsl(${(d.hue||210).toFixed(0)},70%,${light?"42%":"63%"})`)
    .attr("stroke-opacity",d=>Math.min(.6,.2+d.w*.13))
    .attr("stroke-width",d=>1+Math.min(3.5,d.w*.7));
  // wide invisible hit area so the thin line is easy to hover
  const ht=gHit.selectAll("line").data(links,lkey);
  ht.exit().remove();
  ht.enter().append("line").attr("class","linkhit")
    .on("mousemove",(e,d)=>showLinkTip(e,d)).on("mouseleave",hideTip)
    .merge(ht);

  const nd=gNode.selectAll("g.nodeg").data(nodes,d=>d.id);
  nd.exit().remove();
  const en=nd.enter().append("g").attr("class","nodeg node").call(drag(sim));
  en.append("circle").attr("class","burst");
  en.append("circle").attr("class","track");
  en.append("circle").attr("class","ring");
  en.append("circle").attr("class","core");
  en.append("text").attr("class","idx");
  en.append("text").attr("class","lbl");
  en.on("click",(e,d)=>{ if(d.openable&&d.wid) openTerm(d.wid,d.label); })
    .on("mousemove",(e,d)=>showTip(e,d)).on("mouseleave",hideTip);

  const all=en.merge(nd);
  all.each(function(d){
    const g=d3.select(this);
    g.attr("class","nodeg node "+(d.openable?(d.status||"unknown"):"ext")+(d.openable?" openable":""));
    const r=R(d), c=2*Math.PI*(r+8);
    g.select(".track").attr("r",r+8).attr("stroke-dasharray",`${c} 0`);
    const frac=d.todos? (d.todos[1]?d.todos[0]/d.todos[1]:0):0;
    g.select(".ring").attr("r",r+8).attr("transform","rotate(-90)")
      .attr("stroke-dasharray",`${(c*frac).toFixed(1)} ${c}`);
    g.select(".core").attr("r",r);
    g.select(".burst").attr("stroke","none");
    g.select(".idx").text(d.i+1);
    g.select(".lbl").attr("y",r+22).text(d.label.length>26?d.label.slice(0,25)+"…":d.label);
    g.style("--h",d.hue);
    // folder column hanging straight below the node
    const fl=g.selectAll("text.frow").data(d.folders);
    fl.exit().remove();
    fl.enter().append("text").attr("class","frow").merge(fl)
      .attr("y",(f,k)=>r+40+k*16)
      .text(f=>{const b=base(f);return "→ "+(b.length>22?b.slice(0,21)+"…":b);});
  });

  // completion burst
  agents.forEach(a=>{
    const prev=seqs.get(a.cwd);
    if(prev!==undefined && a.seq>prev){
      const g=gNode.selectAll("g.node").filter(d=>d.id===a.cwd);
      g.classed("done",false); g.node()&&void g.node().offsetWidth;
      g.select(".burst").attr("stroke","hsl("+hue(a.phrase)+",90%,62%)").attr("stroke-width",3).attr("fill","none");
      g.classed("done",true);
      setTimeout(()=>g.classed("done",false),3000);
    }
    seqs.set(a.cwd,a.seq);
  });

  sim.nodes(nodes);
  sim.force("link").links(links);
  if(topoChanged || links.length!==lastLinks){ lastLinks=links.length; sim.alpha(.6).restart(); }
  else sim.alphaTarget(0);
}

function ticked(){
  gLink.selectAll("line").attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
    .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  gHit.selectAll("line").attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
    .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  gNode.selectAll("g.nodeg").attr("transform",d=>`translate(${d.x||0},${d.y||0})`);
  nodes.forEach(n=>pos.set(n.id,{x:n.x,y:n.y,vx:n.vx,vy:n.vy}));
}

function drag(sim){
  return d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;});
}

const tip=document.getElementById("tip");
function showTip(e,d){
  let m=d.todos?`todos ${d.todos[0]}/${d.todos[1]} · `:"";
  m+=`load ${d.load}%`+(d.procs>1?` · ×${d.procs}`:"");
  tip.innerHTML=`<div class="tt">${esc(d.label)}</div><div class="tm">${d.openable?"⧉ tmux · "+d.status:"external"}</div>`+
    `<div class="tm">${m}</div>`+(d.phrase?`<div class="tp">${esc(d.phrase)}</div>`:"");
  tip.classList.add("on");
  const x=Math.min(e.clientX+16,innerWidth-360), y=Math.min(e.clientY+16,innerHeight-160);
  tip.style.left=x+"px"; tip.style.top=y+"px";
}
function showLinkTip(e,d){
  const a=d.source.label||d.source.id, b=d.target.label||d.target.id;
  const list=(d.shared||[]).map(f=>`<div class="ln"><span class="br">→ </span>${esc(base(f))} <span style="opacity:.5">${esc(f)}</span></div>`).join("");
  tip.innerHTML=`<div class="tt">${d.shared.length} shared folder${d.shared.length>1?"s":""}</div>`+
    `<div class="tm">${esc(a)} ⇄ ${esc(b)}</div><div class="tp" style="font-style:normal">${list}</div>`;
  tip.classList.add("on");
  const x=Math.min(e.clientX+16,innerWidth-360), y=Math.min(e.clientY+16,innerHeight-200);
  tip.style.left=x+"px"; tip.style.top=y+"px";
}
function hideTip(){tip.classList.remove("on");}

function resize(){W=innerWidth;H=innerHeight;svg.attr("width",W).attr("height",H);}
addEventListener("resize",resize);resize();

async function tick(){
  let d; try{ d=await (await fetch("/api/agents",{cache:"no-store"})).json(); }catch(e){ return; }
  const work=d.agents.filter(a=>a.status==="working").length;
  const idle=d.agents.filter(a=>a.status==="idle").length;
  s_total.textContent=d.agents.length; s_work.textContent=work; s_idle.textContent=idle; s_ext.textContent=d.external;
  update(d.agents);
}
const s_total=document.getElementById("s-total"),s_work=document.getElementById("s-work"),
      s_idle=document.getElementById("s-idle"),s_ext=document.getElementById("s-ext");
tick(); setInterval(tick,1500);

// ---- xterm.js terminal ----
var term=null,fit=null,ws=null;
function openTerm(wid,label){
  document.getElementById("term-title").textContent=label;
  document.getElementById("ov").classList.add("on");
  const el=document.getElementById("term");el.innerHTML="";
  term=new Terminal({fontFamily:'"SF Mono",ui-monospace,"JetBrains Mono",Menlo,monospace',
    fontSize:13,cursorBlink:true,allowProposedApi:true,theme:xtermTheme()});
  fit=new FitAddon.FitAddon();term.loadAddon(fit);term.open(el);
  setTimeout(()=>{fit.fit();connect(wid);},30);
}
function connect(wid){
  const proto=location.protocol==="https:"?"wss":"ws";
  ws=new WebSocket(`${proto}://${location.host}/ws?w=${encodeURIComponent(wid)}`);
  ws.binaryType="arraybuffer";
  ws.onopen=()=>{sendResize();term.focus();};
  ws.onmessage=e=>{if(e.data instanceof ArrayBuffer)term.write(new Uint8Array(e.data));};
  ws.onclose=()=>{term&&term.write("\r\n\x1b[2m[detached]\x1b[0m\r\n");};
  term.onData(x=>{if(ws&&ws.readyState===1)ws.send(new TextEncoder().encode(x));});
  term.onResize(()=>sendResize());
  addEventListener("resize",onWinResize);
}
function sendResize(){if(ws&&ws.readyState===1&&term)ws.send(JSON.stringify({resize:{cols:term.cols,rows:term.rows}}));}
function onWinResize(){if(fit)fit.fit();}
function closeTerm(){removeEventListener("resize",onWinResize);
  if(ws){try{ws.close();}catch(e){}ws=null;}if(term){term.dispose();term=null;}
  document.getElementById("ov").classList.remove("on");}
addEventListener("keydown",e=>{if(e.key==="Escape"&&document.getElementById("ov").classList.contains("on"))closeTerm();});
</script>
</body>
</html>
