    <rect x="566" y="-9" width="74" height="18" rx="9" fill="#0a0c14" stroke="#2a3550"/>
    <text x="603" y="4" text-anchor="middle" font-size="11" fill="#6cb6ff">tmux</text>
    <text x="28" y="74" font-family="monospace" font-size="48" font-weight="700" fill="#8893a6">2</text>
    <circle cx="92" cy="36" r="6" fill="none" stroke="#f0c75a" stroke-width="2"/>
    <text x="108" y="41" font-size="15.5" font-weight="600" fill="#e6ebf5">Draft the API schema</text>
    <g transform="translate(108,52)">
      <rect x="0"   y="0" width="14" height="8" rx="2" fill="#6ec896"/>
      <rect x="18"  y="0" width="14" height="8" rx="2" fill="#6ec896"/>
      <rect x="36"  y="0" width="14" height="8" rx="2" fill="#2a3142"/>
      <rect x="54"  y="0" width="14" height="8" rx="2" fill="#2a3142"/>
      <rect x="72"  y="0" width="14" height="8" rx="2" fill="#2a3142"/>
      <rect x="90"  y="0" width="14" height="8" rx="2" fill="#2a3142"/>
      <text x="120" y="8" font-size="12" fill="#9aa6bd" font-family="monospace">2/6</text>
    </g>
    <text x="632" y="64" text-anchor="end" font-size="13" fill="#7b8597">load 8%</text>
    <text x="108" y="86" font-size="13" font-style="italic" fill="#6b7794">Waiting on review...</text>
  </g>
  <!-- card 2 folders -->
  <g transform="translate(44,414)" font-family="monospace" font-size="13" fill="#9fb4d6">
    <line x1="0" y1="10" x2="16" y2="10" stroke="#5f7da5"/>
    <polygon points="16,6 24,10 16,14" fill="#5f7da5"/>
    <text x="32" y="14">schema</text>
    <line x1="0" y1="32" x2="16" y2="32" stroke="#5f7da5"/>
    <polygon points="16,28 24,32 16,36" fill="#5f7da5"/>
    <text x="32" y="36">docs</text>
  </g>

  <!-- status bar -->
  <text x="36" y="500" font-size="12.5" fill="#5b6478">3 external claudes also discovered (dimmed, monitor-only)</text>
  <line x1="6" y1="516" x2="714" y2="516" stroke="#202a40"/>
  <text x="36" y="538" font-size="13" fill="#7b8597">n new  ·  i instruct  ·  p projects  ·  open  ·  d kill  ·  q quit</text>
</svg>
